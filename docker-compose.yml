version: '3.8'
services:
  db:
    image: postgres
    ports: 
    - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}

    volumes:
      - ./megasena.csv:/megasena.csv
      - ./init/schema.sql:/docker-entrypoint-initdb.d/init.sql
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}


    